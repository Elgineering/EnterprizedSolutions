version: '3.8'

# eee – Enterprized Solutions: Local stack for Core Data & Messaging (UNT)
# Spins up Postgres (Aurora-compatible), DynamoDB Local (ODS), Redis, Kafka (Redpanda),
# LocalStack (SQS/SNS), and helper UIs. Includes an Outbox Publisher demo service.

services:
  postgres:
    image: postgres:15-alpine
    container_name: eee-rds-core-UNT
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-eee_core_unt}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.11
    container_name: eee-msk-core-UNT
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - '1'
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - '0'
      - --check=false
      - --set
      - redpanda.enable_idempotence=true
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info -X brokers=localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: eee-kafka-ui-UNT
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: eee-msk-core-UNT
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy

  dynamodb:
    image: amazon/dynamodb-local:2.0.0
    container_name: eee-ods-dynamodb-UNT
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb"]
    ports:
      - "${DYNAMODB_PORT:-8000}:8000"
    volumes:
      - ./dynamodb/data:/home/dynamodblocal/data

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: eee-ods-dynamodb-admin-UNT
    environment:
      DYNAMO_ENDPOINT: http://dynamodb:8000
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "${DYNAMODB_ADMIN_PORT:-8001}:8001"
    depends_on:
      - dynamodb

  localstack:
    image: localstack/localstack:3.6
    container_name: eee-aws-localstack-UNT
    environment:
      - SERVICES=sqs,sns,iam,cloudwatch,logs
      - EDGE_PORT=4566
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - DEBUG=0
    ports:
      - "${LOCALSTACK_EDGE_PORT:-4566}:4566"
    volumes:
      - ./localstack/data:/var/lib/localstack

  redis:
    image: redis:7-alpine
    container_name: eee-cache-redis-UNT
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./redis/data:/data

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: eee-cache-redis-admin-UNT
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "${REDIS_UI_PORT:-8081}:8081"
    depends_on:
      - redis

  outbox-publisher:
    build: ../../../services/outbox-publisher
    container_name: eee-outbox-publisher-UNT
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-eee_core_unt}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-eee.events.core.unt}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      SQS_ENDPOINT: http://localstack:4566
      SQS_QUEUE_NAME: ${SQS_QUEUE_NAME:-eee-core-events-unt}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-1000}
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      localstack:
        condition: service_started
    restart: unless-stopped

networks:
  default:
    name: eee-core-UNT-net
